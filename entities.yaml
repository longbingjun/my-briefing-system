domains:
  - id: ai_research
    name: AI 研究前沿
    description: 覆盖预训练、后训练、推理训练、评测、安全、数据与算力基础设施。

  - id: ai_products
    name: AI 产品与 Agent
    description: 覆盖 Claude Code、Codex、Cursor、AI Agents、工作流自动化与产品化。

  - id: industry_transformation
    name: AI 改造传统领域
    description: 观察 AI 对软件、数据、财务、制造、供应链、教育、医疗等旧领域的重构。

  - id: official_signals
    name: 官方信号与科技圈动态
    description: 官方博客、研究团队、公司账号和高价值个人账号发布的动向。

  - id: finance_digitization
    name: 财务数字化与成本管理
    description: 结合你的工作场景，跟踪成本数据库、预算、FinOps、数据指标和自动化。

